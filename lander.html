<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>BattleRush — Dice</title>
<meta name="description" content="BattleRush Dice is a playful, responsive game page with a fast canvas runner.">

<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<!-- Keep if these files exist in your project -->
<link rel="stylesheet" href="assets/css/style.css"> 
<!-- If you actually have a base.css inside assets/css/, keep this next line; otherwise remove it -->
<!-- <link rel="stylesheet" href="assets/css/base.css"> -->

<style>
  body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin:0; color:#0f172a; background:#f8fafc; }

  /* Header (site-wide style) */
  .header { position: sticky; top:0; z-index:50; background:#0b1020; color:#e5e7eb; border-bottom:1px solid var(--ring); }
  .wrap { max-width:1160px; margin:0 auto; padding:0 16px; }
  .nav { display:flex; align-items:center; justify-content:space-between; height:64px; gap:16px; }
  .brand { display:flex; align-items:center; gap:10px; font-weight:800; text-decoration:none; color:#e5e7eb; }
  .brand img { height:28px; }
  .menu { display:flex; gap:14px; align-items:center; }
  .menu a { color:#e5e7eb; text-decoration:none; opacity:.95; }
  .menu a:hover { opacity:1; text-decoration:underline; }
  .burger { display:none; background:none; border:0; color:#e5e7eb; font-size:24px; }
  @media (max-width:800px){ .menu{display:none} .burger{display:block} }
</style>
</head>
<body>

<style>
  /* === Popup styles (borrowed from index.html for consistency) === */
  .af-overlay{position:fixed;inset:0;background:rgba(3,6,23,.74);backdrop-filter:saturate(140%) blur(0px);display:flex;align-items:center;justify-content:center;z-index:9999}
  .af-modal{width:min(92vw,560px);background:#0b1020;color:#e5e7eb;border:1px solid rgba(148,163,184,.25);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.45);padding:24px 20px 18px;position:relative; text-align: center;}
  #af-title{font-size:22px;margin:6px 0 8px}
  .af-text{font-size:15px;line-height:1.6;color:#cbd5e1;margin:0 4px 14px}

  /* Blinking icon animation */
  .blink-icon {
    display: inline-block;
    width: 10px;
    height: 10px;
    margin-right: 10px;
    background-color: #f59e0b; /* Brand orange color */
    border-radius: 50%;
    animation: blink 1.5s infinite ease-in-out;
    vertical-align: middle;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.85); }
  }

  /* Background image styles */
  body {
    margin: 0;
    height: 100vh;
    background: url("assets/img/desk.png") no-repeat center center;
    background-size: cover;
  }
 
  /* Mobile (max 600px) */
  @media (max-width: 600px) {
    body {
      background-image: url("assets/img/mob.png");
    }
  }
 
  /* Tablet (601px – 1024px) */
  @media (min-width: 601px) and (max-width: 1024px) {
    body {
      background-image: url("assets/img/desk.png");
    }
  }
 
  /* Desktop (above 1024px) */
  @media (min-width: 1025px) {
    body {
      background-image: url("assets/img/desk.png");
    }
  }
</style>

<!-- === Redirection Popup Script === -->
<script>
(function () {
  document.addEventListener("DOMContentLoaded", function() {
    // 1. Create and inject the popup overlay and modal
    const overlay = document.createElement("div");
    overlay.className = "af-overlay";
    overlay.innerHTML = `
      <div class="af-modal" role="dialog" aria-modal="true">
        <h2 id="af-title"><span class="blink-icon"></span>Welcome!</h2>
        <p class="af-text">You will be redirected in <strong id="countdown">5</strong> seconds.</p>
      </div>
    `;
    document.body.appendChild(overlay);
    document.body.style.overflow = "hidden"; // Prevent scrolling while popup is active

    // 2. Set up the countdown logic
    let countdown = 5;
    const countdownElement = document.getElementById("countdown");

    const interval = setInterval(() => {
      countdown--;
      if (countdownElement) countdownElement.textContent = countdown;
      if (countdown <= 0) {
        clearInterval(interval);
        window.location.href = 'https://spinquest.online/'; // Redirect to Google
      }
    }, 1000);
  });
})();
</script>
</body>
</html>
